            <!-- ELEMENTO ONDE O RELÓGIO APARECE -->
            <div class="bloco-contador">
                <span>⏱️ Tempo decorrido:</span>
                <p id="contador">0 dias 00 horas 00 minutos 00 segundos</p>
            </div>

            <script>
                document.addEventListener("DOMContentLoaded", () => {
                    // Meia-noite no Horário de Brasília (UTC-3)
                    const inicio = new Date("2026-07-23T00:00:00-03:00").getTime();

                    function actualizarContador() {
                        let agora = new Date().getTime();
                        let diff = agora - inicio;

                        if (diff < 0) {
                            document.getElementById("contador").textContent = "0 dias 00 horas 00 minutos 00 segundos";
                            return;
                        }

                        let dias = Math.floor(diff / (1000 * 60 * 60 * 24));
                        let horas = Math.floor((diff / (1000 * 60 * 60)) % 24);
                        let minutos = Math.floor((diff / (1000 * 60)) % 60);
                        let segundos = Math.floor((diff / 1000) % 60);

                        // Formata os números com 2 dígitos (ex: 00, 05, 45)
                        let h = String(horas).padStart(2, '0');
                        let m = String(minutos).padStart(2, '0');
                        let s = String(segundos).padStart(2, '0');

                        // Exemplo de saída: "0 dias 00 horas 45 minutos 12 segundos"
                        document.getElementById("contador").textContent =
                            `${dias} dias ${h} horas ${m} minutos ${s} segundos`;
                    }

                    setInterval(actualizarContador, 1000);
                    actualizarContador();
                });
            </script>
